<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>root@zyanetralys:~# cyber-ops</title>
  <style>
    :root { --bg:#000; --term:#030803; --surface:#050d05; --border:#003300; --green:#00aa00; --green-bright:#00ff00; --alert-red:#ff2222; --alert-orange:#ff8800; --info-blue:#00ccff; --text:#00ff00; --muted:#006600; --dim:#002200; --font-mono:'Courier New',monospace; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); height: 100vh; overflow: hidden; display: grid; grid-template-rows: auto 1fr auto; font-size: 12px; }
    canvas#matrix-bg, .scanlines, .crt-flicker { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .scanlines { background: repeating-linear-gradient(180deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px); animation: scan 8s linear infinite; }
    .crt-flicker { animation: flicker 0.08s infinite; opacity: 0.02; }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100vh; } }
    @keyframes flicker { 0%,100% { opacity: 0.015; } 50% { opacity: 0.035; } }
    header { background: linear-gradient(180deg, var(--term), var(--surface)); border-bottom: 1px solid var(--green); padding: 0.35rem 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .prompt { display: flex; align-items: center; gap: 0.4rem; } .user { color: var(--green-bright); } .path { color: var(--green); } .cmd { color: var(--green-bright); font-weight: 600; }
    .cursor { display: inline-block; width: 8px; height: 14px; background: var(--green-bright); animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .header-meta { display: flex; align-items: center; gap: 0.8rem; font-size: 0.7rem; color: var(--muted); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--alert-red); display: inline-block; margin-right: 4px; }
    .status-dot.active { background: var(--green-bright); } .status-dot.paused { background: var(--alert-orange); }
    .author-tag { color: var(--green-bright); font-weight: 600; }
    main { display: grid; grid-template-columns: 2.2fr 1.8fr; gap: 0.5rem; padding: 0.5rem; height: 100%; overflow: hidden; z-index: 5; }
    .panel { background: var(--term); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .panel-header { padding: 0.35rem 0.6rem; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 0.68rem; display: flex; justify-content: space-between; align-items: center; color: var(--green-bright); text-transform: uppercase; }
    .panel-header button { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.1rem 0.35rem; cursor: pointer; font-size: 0.62rem; }
    .panel-header button:hover { background: var(--green); color: #000; }
    .view-container { flex: 1; position: relative; overflow: hidden; }
    #chat-log { width: 100%; height: 100%; overflow-y: auto; padding: 0.4rem; background: rgba(0,8,0,0.3); }
    #threat-map { width: 100%; height: 100%; display: block; }
    .map-overlay { position: absolute; inset: 0; pointer-events: none; }
    .map-legend { position: absolute; bottom: 0.5rem; left: 0.5rem; background: rgba(0,20,0,0.9); border: 1px solid var(--border); padding: 0.4rem 0.6rem; font-size: 0.65rem; }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; margin: 0.15rem 0; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .legend-dot.node { background: var(--green); border: 2px solid var(--green-bright); }
    .legend-dot.attack { background: var(--alert-red); }
    .map-stats { position: absolute; top: 0.5rem; right: 0.5rem; background: rgba(0,20,0,0.9); border: 1px solid var(--border); padding: 0.4rem 0.6rem; font-size: 0.65rem; }
    .stat-row { display: flex; justify-content: space-between; margin: 0.1rem 0; min-width: 100px; }
    .stat-val { color: var(--green-bright); font-weight: 600; }
    .sys-msg { color: var(--info-blue); padding: 0.15rem 0 0.15rem 0.4rem; border-left: 2px dashed var(--border); margin: 0.3rem 0; font-style: italic; }
    .msg { display: flex; gap: 0.4rem; padding: 0.15rem 0; }
    .msg-prefix { color: var(--green-bright); font-weight: 500; white-space: nowrap; min-width: 140px; font-size: 0.75rem; }
    .msg-prefix .handle { color: var(--info-blue); font-weight: 600; }
    .msg-prefix .role { color: var(--muted); font-size: 0.7em; margin-left: 0.25rem; }
    .msg-text { color: var(--text); flex: 1; word-break: break-word; padding: 0.2rem 0; }
    .msg.highlight .msg-text { color: var(--alert-orange); }
    .msg.reply .msg-text { border-left: 2px solid var(--info-blue); padding-left: 0.4rem; color: var(--info-blue); }
    .kw { background: rgba(0,170,0,0.25); color: var(--green-bright); padding: 0 3px; border-radius: 2px; font-weight: 600; border: 1px solid var(--green); }
    .mention { color: var(--info-blue); font-weight: 600; cursor: pointer; }
    .typing { color: var(--green-bright); font-style: italic; padding: 0.15rem 0 0.15rem 140px; font-size: 0.75rem; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); overflow-x: auto; font-size: 0.63rem; }
    .tab-btn { padding: 0.35rem 0.6rem; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; text-transform: uppercase; }
    .tab-btn:hover { color: var(--green-bright); }
    .tab-btn.active { color: var(--green-bright); border-bottom-color: var(--green-bright); }
    .tab-content { display: none; padding: 0.45rem; overflow-y: auto; flex: 1; font-size: 0.73rem; }
    .tab-content.active { display: block; }
    .profile-card { background: var(--surface); border: 1px solid var(--border); padding: 0.45rem; margin-bottom: 0.35rem; cursor: pointer; }
    .profile-card:hover { border-color: var(--green); background: #001a00; }
    .profile-card.bookmarked { border-left: 3px solid var(--green-bright); }
    .profile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.25rem; }
    .profile-handle { color: var(--info-blue); font-weight: 600; font-size: 0.82rem; }
    .profile-role { color: var(--muted); font-size: 0.68rem; }
    .profile-score { color: var(--green-bright); font-weight: 700; }
    .profile-bar { height: 3px; background: var(--border); margin: 0.25rem 0; overflow: hidden; }
    .profile-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--green-bright)); width: 0%; transition: width 0.3s; }
    .profile-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.15rem 0.4rem; font-size: 0.63rem; color: var(--muted); margin: 0.25rem 0; }
    .profile-stats strong { color: var(--text); }
    .profile-tags { display: flex; flex-wrap: wrap; gap: 0.15rem; margin: 0.25rem 0; }
    .tag { font-size: 0.58rem; background: var(--border); color: var(--muted); padding: 1px 4px; border: 1px solid var(--border); }
    .tag.hot { background: rgba(0,170,0,0.3); color: var(--green-bright); border-color: var(--green); }
    .profile-actions { display: flex; gap: 0.25rem; margin-top: 0.25rem; }
    .profile-actions button { background: var(--border); border: none; color: var(--muted); padding: 0.12rem 0.35rem; cursor: pointer; font-size: 0.58rem; }
    .profile-actions button:hover { background: var(--green); color: #000; }
    .profile-actions button.active { background: var(--green-bright); color: #000; font-weight: 600; }
    .kw-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 0.25rem; }
    .kw-item { background: var(--surface); border: 1px solid var(--border); padding: 0.35rem; text-align: center; font-size: 0.68rem; }
    .kw-item:hover { border-color: var(--green); }
    .kw-count { color: var(--green-bright); font-weight: 700; display: block; margin-top: 2px; font-size: 0.82rem; }
    .alert-item { padding: 0.35rem 0; border-bottom: 1px dashed var(--border); font-size: 0.68rem; display: flex; gap: 0.35rem; }
    .alert-sev { font-weight: 700; padding: 0 4px; border-radius: 2px; font-size: 0.62rem; }
    .alert-sev.crit { background: var(--alert-red); color: #000; }
    .alert-sev.high { background: var(--alert-orange); color: #000; }
    .alert-sev.med { background: var(--info-blue); color: #000; }
    .alert-time { color: var(--dim); margin-left: auto; font-size: 0.63rem; }
    .metric-row { display: flex; justify-content: space-between; padding: 0.18rem 0; font-size: 0.68rem; border-bottom: 1px dashed var(--border); }
    .metric-val { color: var(--green-bright); font-weight: 600; }
    .controls { padding: 0.35rem 1rem; background: var(--term); border-top: 1px solid var(--green); display: flex; gap: 0.45rem; align-items: center; flex-wrap: wrap; font-size: 0.68rem; z-index: 10; }
    button, input { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 0.2rem 0.45rem; cursor: pointer; font-family: var(--font-mono); font-size: 0.68rem; }
    button:hover, input:focus { border-color: var(--green); outline: none; }
    button.primary { background: var(--green); color: #000; font-weight: 600; border: none; }
    button.primary:hover { background: var(--green-bright); }
    .slider-wrap { display: flex; align-items: center; gap: 0.25rem; color: var(--muted); }
    input[type="range"] { accent-color: var(--green-bright); width: 75px; }
    footer { background: var(--term); border-top: 1px solid var(--border); padding: 0.25rem 1rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.68rem; color: var(--muted); z-index: 10; }
    .footer-author { color: var(--green-bright); font-weight: 600; }
    .footer-author::before { content: 'auth: '; color: var(--dim); }
    .toast-container { position: fixed; bottom: 50px; right: 12px; z-index: 1000; display: flex; flex-direction: column; gap: 3px; }
    .toast { background: var(--term); border: 1px solid var(--green); border-left: 3px solid var(--green-bright); padding: 0.35rem 0.55rem; font-size: 0.68rem; max-width: 270px; animation: slideIn 0.18s ease; }
    .toast.alert { border-left-color: var(--alert-red); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
    @media (max-width: 950px) { main { grid-template-columns: 1fr; } .monitor-panel { height: 52vh; } }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--term); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--green); }
  </style>
</head>
<body>
  <canvas id="matrix-bg"></canvas>
  <div class="scanlines"></div>
  <div class="crt-flicker"></div>
  <header>
    <div class="prompt"><span>root</span>@<span class="user">zyanetralys</span>:<span class="path">~/ops</span># <span class="cmd">monitor --active</span><span class="cursor"></span></div>
    <div class="header-meta"><span class="status-dot" id="sys-dot"></span><span id="sys-status">OFFLINE</span><span>ops: <strong id="op-count">0</strong></span><span>attacks: <strong id="attack-count" style="color:var(--alert-red)">0</strong></span><span class="author-tag">Zyanetralys</span></div>
  </header>
  <main>
    <section class="panel">
      <div class="panel-header"><span id="panel-title">channel: #threat-intel</span><div><button onclick="App.clearChat()">clear</button><button onclick="App.toggleView()">toggle:map</button></div></div>
      <div id="view-chat" class="view-container"><div id="chat-log"></div></div>
      <div id="view-map" class="view-container" style="display:none;"><canvas id="threat-map"></canvas><div class="map-overlay"></div><div class="map-legend"><div class="legend-item"><span class="legend-dot node"></span> Node</div><div class="legend-item"><span class="legend-dot attack"></span> Attack</div></div><div class="map-stats"><div class="stat-row"><span>Active:</span><span class="stat-val" id="map-active">0</span></div><div class="stat-row"><span>Blocked:</span><span class="stat-val" id="map-blocked">0</span></div></div></div>
    </section>
    <section class="panel monitor-panel">
      <div class="panel-header"><span>dashboard</span><div><button onclick="App.exportJSON()">json</button><button onclick="App.exportCSV()">csv</button></div></div>
      <div class="tabs"><div class="tab-btn active" data-tab="profiles">profiles</div><div class="tab-btn" data-tab="keywords">keywords</div><div class="tab-btn" data-tab="alerts">alerts</div><div class="tab-btn" data-tab="metrics">metrics</div></div>
      <div id="tab-profiles" class="tab-content active"></div><div id="tab-keywords" class="tab-content"></div><div id="tab-alerts" class="tab-content"></div><div id="tab-metrics" class="tab-content"></div>
    </section>

  <div class="controls"><button class="primary" id="btn-toggle" onclick="App.toggle()">▶ start</button><div class="slider-wrap"><span>speed:</span><input type="range" id="speed" min="200" max="3000" value="750" step="50" oninput="App.setSpeed(this.value)"><span id="speed-val">0.75s</span></div><button onclick="App.toggleView()">🌍 map</button><div style="margin-left:auto;color:var(--dim);font-size:0.65rem;">[S]tart [P]ause [M]ap [E]xport</div></div>
  <footer><span>session: <strong id="session-id">zya-0000</strong></span><span class="footer-author">Zyanetralys</span></footer>
  <div class="toast-container" id="toast-container"></div>

<script>
const CFG={keywords:['pentest','exploit','c2','malware','zero-day','ransomware','ddos','edr','siem','soc','threat hunting','ioc','mitre att&ck','phishing','botnet','sql injection','xss','reverse','forensics','yara','sigma','kubernetes','aws','azure','docker','iam','zero-trust'],roles:['Pentester','Red Team','SOC L1','SOC L2','Threat Hunter','Malware Analyst','Reverse Engineer','Cloud Sec','IR Lead','GRC Analyst'],handles:['NullPtr','CipherWolf','KernelPanic','PhantomRoot','ZeroTrust','DarkNode','ByteShift','NullByte','RootKitty','ShadowSys'],personas:{technical:{post:['deploying {kw} to staging','testing {kw} evasion, AV bypass: 94%','analyzing {kw} sample, beacon: 14.3s'],reply:['confirmed. same {kw} pattern in telemetry','correlating {kw} with MITRE T1059.001']},analytical:{post:['preliminary {kw} analysis shows multi-stage flow','{kw} indicators suggest APT-style TTPs'],reply:['cross-referenced {kw} with last week IOCs','escalating {kw} findings to IR team']},operational:{post:['red team executed {kw}. MTTD:17min MTTR:5min','playbook updated for {kw} containment'],reply:['aligned with metrics, tuning {kw} thresholds','integrating {kw} indicators into EDR']},strategic:{post:['evaluating {kw} impact on zero-trust arch','budget review: {kw} tooling ROI complete'],reply:['aligning {kw} initiatives with Q3 objectives']}},weights:{tech:0.35,collab:0.25,threat:0.25,consistency:0.15}};

const STATE={bots:[],messages:[],threads:[],alerts:[],attacks:[],metrics:{totalMsgs:0,kwHits:0,alerts:0,attacks:0,blocked:0},running:false,interval:750,showMap:false,sessionId:`zya-${Math.floor(Math.random()*9000)+1000}`,countries:[{code:'US',x:28,y:38,threat:0},{code:'CN',x:78,y:42,threat:0},{code:'RU',x:68,y:28,threat:0},{code:'IR',x:62,y:48,threat:0},{code:'KP',x:82,y:38,threat:0},{code:'BR',x:35,y:72,threat:0},{code:'DE',x:52,y:32,threat:0},{code:'GB',x:48,y:30,threat:0},{code:'FR',x:50,y:35,threat:0},{code:'IN',x:72,y:52,threat:0},{code:'JP',x:88,y:38,threat:0},{code:'AU',x:90,y:78,threat:0},{code:'ES',x:47,y:42,threat:0},{code:'IT',x:54,y:38,threat:0},{code:'NL',x:51,y:30,threat:0}],attackTypes:['DDoS','Brute Force','SQL Injection','XSS','Malware Drop','C2 Beacon','Data Exfil','Phishing Campaign','Zero-Day Exploit']};

class Bot{constructor(id,handle,role){this.id=id;this.handle=handle;this.role=role;this.expertise=new Set(CFG.keywords.slice(Math.floor(Math.random()*6),Math.floor(Math.random()*9)+6));this.hits={};this.scores={tech:0,collab:0,threat:0,consistency:0};this.state='idle';this.bookmarked=false;this.priority='medium';this.personaType=['technical','analytical','operational','strategic'][Math.floor(Math.random()*4)];this.persona=CFG.personas[this.personaType];this.lastActive=Date.now();this.msgCount=0;this.replyRate=0.28+Math.random()*0.25;this.messages=[]}addHit(kw){this.hits[kw]=(this.hits[kw]||0)+1;this.calcScores()}calcScores(){const total=Object.values(this.hits).reduce((a,b)=>a+b,0);this.scores.tech=Math.min(100,this.expertise.size*9+total*2.2);this.scores.collab=Math.min(100,this.messages.filter(m=>m.reply).length*14);this.scores.threat=Math.min(100,Object.keys(this.hits).filter(k=>['zero-day','c2','bypass','evasion','privilege escalation','malware','ransomware','ddos'].includes(k)).length*20);this.scores.consistency=Math.min(100,Math.min(25,this.msgCount)*4);this.total=Math.round(this.scores.tech*CFG.weights.tech+this.scores.collab*CFG.weights.collab+this.scores.threat*CFG.weights.threat+this.scores.consistency*CFG.weights.consistency)}getTier(){const t=this.total;if(t>=90)return'Principal';if(t>=75)return'Senior';if(t>=55)return'Mid';return'Junior'}}

const Matrix={canvas:null,ctx:null,fontSize:14,columns:0,drops:[],init(){this.canvas=document.getElementById('matrix-bg');this.ctx=this.canvas.getContext('2d');this.resize();window.addEventListener('resize',()=>this.resize());this.loop()},resize(){this.canvas.width=window.innerWidth;this.canvas.height=window.innerHeight;this.columns=Math.floor(this.canvas.width/this.fontSize);this.drops=Array(this.columns).fill(0).map(()=>Math.random()*-100)},loop(){this.ctx.fillStyle='rgba(0,0,0,0.04)';this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);this.ctx.fillStyle='#00ff00';this.ctx.font=`${this.fontSize}px monospace`;for(let i=0;i<this.columns;i++){const char=String.fromCharCode(0x30A0+Math.random()*96);const x=i*this.fontSize,y=this.drops[i]*this.fontSize;this.ctx.fillText(char,x,y);if(y>this.canvas.height&&Math.random()>0.98)this.drops[i]=0;this.drops[i]++}requestAnimationFrame(()=>this.loop())}};

const MapEngine={canvas:null,ctx:null,width:0,height:0,running:false,init(container){this.canvas=document.getElementById('threat-map');if(!this.canvas)return;this.ctx=this.canvas.getContext('2d');this.resize(container);if(!this.running){this.running=true;this.loop()}},resize(container){if(container.style.display==='none')return;const rect=container.getBoundingClientRect();if(rect.width>0&&rect.height>0){this.width=rect.width;this.height=rect.height;this.canvas.width=this.width;this.canvas.height=this.height}},loop(){if(!this.running)return;const ctx=this.ctx,w=this.width,h=this.height;ctx.clearRect(0,0,w,h);STATE.countries.forEach(c=>{const x=(c.x/100)*w,y=(c.y/100)*h;if(c.threat>30){const glow=ctx.createRadialGradient(x,y,0,x,y,15);glow.addColorStop(0,c.threat>70?'rgba(255,51,51,0.4)':'rgba(0,255,0,0.2)');glow.addColorStop(1,'transparent');ctx.fillStyle=glow;ctx.beginPath();ctx.arc(x,y,15,0,Math.PI*2);ctx.fill()}ctx.fillStyle=c.threat>50?'#ff3333':'#00ff00';ctx.strokeStyle=c.threat>50?'#ff9900':'#00ff00';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#006600';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText(c.code,x,y-12)});STATE.attacks.forEach(a=>{const src=STATE.countries.find(c=>c.code===a.src),tgt=STATE.countries.find(c=>c.code===a.tgt);if(!src||!tgt)return;const x1=(src.x/100)*w,y1=(src.y/100)*h,x2=(tgt.x/100)*w,y2=(tgt.y/100)*h;const angle=Math.atan2(y2-y1,x2-x1),len=Math.hypot(x2-x1,y2-y1);ctx.save();ctx.translate(x1,y1);ctx.rotate(angle);const grad=ctx.createLinearGradient(0,0,len,0);const col=a.severity==='crit'?'#ff3333':a.severity==='high'?'#ff9900':'#00ccff';grad.addColorStop(0,'transparent');grad.addColorStop(0.5,col);grad.addColorStop(1,'transparent');ctx.strokeStyle=grad;ctx.lineWidth=2;ctx.shadowBlur=8;ctx.shadowColor=col;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(len,0);ctx.stroke();ctx.restore();a.progress=(a.progress||0)+0.015;if(a.progress>=1)a.progress=0;const px=x1+(x2-x1)*a.progress,py=y1+(y2-y1)*a.progress;ctx.fillStyle=a.detected?'#00ff00':col;ctx.shadowBlur=12;ctx.shadowColor=ctx.fillStyle;ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0});document.getElementById('map-active').textContent=STATE.attacks.length;document.getElementById('map-blocked').textContent=STATE.metrics.blocked;requestAnimationFrame(()=>this.loop())}};

const Engine={init(){if(STATE.bots.length)return;CFG.handles.forEach((h,i)=>STATE.bots.push(new Bot(`B${i+1}`,h,CFG.roles[Math.floor(Math.random()*CFG.roles.length)])))},start(){if(STATE.running)return;STATE.running=true;STATE._timer=setInterval(()=>this.cycle(),STATE.interval);document.getElementById('sys-status').textContent='INTERCEPTING';document.getElementById('sys-dot').className='status-dot active';document.getElementById('btn-toggle').textContent='⏹ pause';UI.sysMsg('▶ monitoring active')},stop(){if(!STATE.running)return;STATE.running=false;clearInterval(STATE._timer);document.getElementById('sys-status').textContent='PAUSED';document.getElementById('sys-dot').className='status-dot paused';document.getElementById('btn-toggle').textContent='▶ start';UI.sysMsg('⏸ monitoring paused')},cycle(){if(Math.random()<0.75){const bot=STATE.bots[Math.floor(Math.random()*STATE.bots.length)];const shouldReply=STATE.messages.length>3&&Math.random()<bot.replyRate;bot.state='typing';UI.showTyping(bot);setTimeout(()=>{bot.state='idle';bot.lastActive=Date.now();bot.msgCount++;const msg=this.genMsg(bot,shouldReply);const entry={id:Date.now()+Math.random(),bot,msg,ts:Date.now(),reply:!!msg.replyTarget};STATE.messages.push(entry);bot.messages.push(entry);STATE.metrics.totalMsgs++;this.updateThreads(bot,msg);UI.hideTyping(bot);UI.pushChat(entry);UI.scan(bot,msg);UI.updateCounters();UI.renderAll()},200+Math.random()*350)}if(Math.random()<0.25)AttackEngine.generate()},genMsg(bot,shouldReply){let kw,text,replyTarget=null;if(shouldReply&&STATE.messages.length>2){const recent=STATE.messages.slice(-8).filter(m=>Date.now()-m.ts<25000);if(recent.length){const prev=recent[Math.floor(Math.random()*recent.length)];replyTarget=prev.bot.handle;kw=prev.msg.kw||this.pickKw(bot);text=this.tpl(bot.persona.reply[Math.floor(Math.random()*bot.persona.reply.length)],kw,bot.role,replyTarget)}else shouldReply=false}if(!shouldReply){kw=this.pickKw(bot);text=this.tpl(bot.persona.post[Math.floor(Math.random()*bot.persona.post.length)],kw,bot.role)}return{text,replyTarget,kw}},pickKw(bot){return(Math.random()<0.6&&bot.expertise.size>0)?[...bot.expertise][Math.floor(Math.random()*bot.expertise.size)]:CFG.keywords[Math.floor(Math.random()*CFG.keywords.length)]},tpl(tpl,kw,role,handle){return tpl.replace(/{kw}/g,kw).replace(/{role}/g,role).replace(/{handle}/g,handle||'')},updateThreads(bot,msg){let thread=STATE.threads.find(t=>t.kw===msg.kw&&t.active&&Date.now()-t.lastMsg<30000);if(!thread){thread={id:Date.now(),kw:msg.kw,participants:new Set([bot.handle]),msgs:1,lastMsg:Date.now(),active:true};STATE.threads.unshift(thread);if(STATE.threads.length>8)STATE.threads.pop()}else{thread.participants.add(bot.handle);thread.msgs++;thread.lastMsg=Date.now()}STATE.threads.forEach(t=>{if(Date.now()-t.lastMsg>45000)t.active=false});STATE.threads=STATE.threads.filter(t=>t.active)}};

const AttackEngine={generate(){if(!STATE.running)return;const src=STATE.countries.filter(c=>['CN','RU','IR','KP'].includes(c.code))[Math.floor(Math.random()*4)];const tgt=STATE.countries.filter(c=>!['CN','RU','IR','KP'].includes(c.code))[Math.floor(Math.random()*11)];if(!src||!tgt)return;const type=STATE.attackTypes[Math.floor(Math.random()*STATE.attackTypes.length)];const severity=Math.random()>0.75?'crit':Math.random()>0.45?'high':'med';const attack={id:Date.now()+Math.random(),src:src.code,tgt:tgt.code,type,severity,ts:Date.now(),detected:Math.random()>0.25,blocked:false,progress:0};STATE.attacks.unshift(attack);STATE.metrics.attacks++;src.threat=Math.min(100,src.threat+12);setTimeout(()=>{if(!attack.blocked&&attack.detected){attack.blocked=true;STATE.metrics.blocked++}},3000+Math.random()*4000);if(STATE.attacks.length>20)STATE.attacks.pop()}};

const UI={chatLog:document.getElementById('chat-log'),pushChat(entry){const{bot,msg,ts}=entry;const group=document.createElement('div');group.className='msg';const time=new Date(ts).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});let text=msg.text.replace(/(@\w+)/g,'<span class="mention">$1</span>').replace(new RegExp(`(${CFG.keywords.join('|')})`,'gi'),'<span class="kw">$1</span>');const cls=`msg-text ${msg.replyTarget?' reply':''}${msg.kw?' highlight':''}`;group.innerHTML=`<div class="msg-prefix"><span class="handle">${bot.handle}</span>${bot.role?`<span class="role">${bot.role}</span>`:''}<span class="time">${time}</span></div><div class="${cls}">${text}</div>`;this.chatLog.appendChild(group);this.chatLog.scrollTop=this.chatLog.scrollHeight;if(this.chatLog.children.length>100)this.chatLog.removeChild(this.chatLog.children[0])},sysMsg(text){const div=document.createElement('div');div.className='sys-msg';div.textContent=`[${new Date().toLocaleTimeString()}] ${text}`;this.chatLog.appendChild(div);this.chatLog.scrollTop=this.chatLog.scrollHeight},showTyping(bot){let el=document.getElementById(`ty-${bot.id}`);if(!el){el=document.createElement('div');el.id=`ty-${bot.id}`;el.className='typing';this.chatLog.appendChild(el)}el.innerHTML=`${bot.handle} typing<span>.</span><span>.</span><span>.</span>`;this.chatLog.scrollTop=this.chatLog.scrollHeight},hideTyping(bot){const el=document.getElementById(`ty-${bot.id}`);if(el)el.remove()},scan(bot,msg){if(!msg.kw)return;if(CFG.keywords.includes(msg.kw)){bot.addHit(msg.kw);STATE.metrics.kwHits++}const critical=['zero-day','c2','bypass','evasion','privilege escalation','malware','ransomware','ddos'];if(critical.some(k=>msg.text.toLowerCase().includes(k))){this.logAlert(bot,msg,critical.filter(k=>msg.text.toLowerCase().includes(k))[0]);App.toast(`⚠ ${bot.handle}: ${msg.kw} detected`,'alert')}},logAlert(bot,msg,kw){const alert={id:Date.now(),bot:bot.handle,kw,text:msg.text.substring(0,70),ts:new Date(),severity:['zero-day','c2','ransomware','ddos'].includes(kw)?'crit':(['bypass','evasion','malware'].includes(kw)?'high':'med')};STATE.alerts.unshift(alert);STATE.metrics.alerts++;if(STATE.alerts.length>40)STATE.alerts.pop()},updateCounters(){document.getElementById('op-count').textContent=STATE.bots.length;document.getElementById('attack-count').textContent=STATE.metrics.attacks},renderAll(){this.renderProfiles();this.renderKeywords();this.renderAlerts();this.renderMetrics()},renderProfiles(){const c=document.getElementById('tab-profiles'),s=[...STATE.bots].sort((a,b)=>b.total-a.total);c.innerHTML=s.map(b=>`<div class="profile-card ${b.bookmarked?'bookmarked':''}" onclick="App.selectBot('${b.id}')"><div class="profile-header"><div><span class="profile-handle">${b.handle}</span><span class="profile-role">${b.role}</span></div><span class="profile-score">${b.total}%</span></div><div class="profile-bar"><div class="profile-fill" style="width:${b.total}%"></div></div><div class="profile-stats"><span>Tech:<strong>${b.scores.tech|0}%</strong></span><span>Collab:<strong>${b.scores.collab|0}%</strong></span><span>Threat:<strong>${b.scores.threat|0}%</strong></span><span>Cons:<strong>${b.scores.consistency|0}%</strong></span></div><div class="profile-tags">${[...b.expertise].slice(0,6).map(e=>`<span class="tag ${b.hits[e]>=2?'hot':''}">${e}</span>`).join('')}</div><div class="profile-actions"><button class="${b.bookmarked?'active':''}" onclick="event.stopPropagation();App.toggleBookmark('${b.id}')">${b.bookmarked?'★ saved':'☆ save'}</button><button onclick="event.stopPropagation();App.setPriority('${b.id}','high')">🔴</button><button onclick="event.stopPropagation();App.setPriority('${b.id}','medium')">🟡</button></div></div>`).join('')},renderKeywords(){const c=document.getElementById('tab-keywords'),counts={};CFG.keywords.forEach(k=>counts[k]=0);STATE.bots.forEach(b=>Object.entries(b.hits).forEach(([k,v])=>counts[k]+=v));const s=Object.entries(counts).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,20);c.innerHTML=`<div class="kw-grid">${s.map(([k,v])=>`<div class="kw-item">${k}<span class="kw-count">${v}</span></div>`).join('')}</div>`},renderAlerts(){const c=document.getElementById('tab-alerts');if(!STATE.alerts.length){c.innerHTML='<div style="color:var(--dim);text-align:center;padding:1rem">[ no alerts ]</div>';return}c.innerHTML=STATE.alerts.slice(0,30).map(a=>`<div class="alert-item"><span class="alert-sev ${a.severity}">${a.severity.toUpperCase()}</span><div><strong>${a.bot}</strong> | ${a.kw}<br><span style="color:var(--dim)">${a.text}...</span></div><span class="alert-time">${a.ts.toLocaleTimeString()}</span></div>`).join('')},renderMetrics(){const c=document.getElementById('tab-metrics'),topBots=[...STATE.bots].sort((a,b)=>b.total-a.total).slice(0,5),topKws=Object.entries(STATE.bots.reduce((acc,b)=>{Object.entries(b.hits).forEach(([k,v])=>acc[k]=(acc[k]||0)+v);return acc},{})).sort((a,b)=>b[1]-a[1]).slice(0,5);c.innerHTML=`<div style="margin-bottom:0.7rem"><div style="color:var(--green-bright);margin-bottom:0.25rem">SESSION METRICS</div><div class="metric-row"><span>Total Messages</span><span class="metric-val">${STATE.metrics.totalMsgs}</span></div><div class="metric-row"><span>Keyword Hits</span><span class="metric-val">${STATE.metrics.kwHits}</span></div><div class="metric-row"><span>Alerts</span><span class="metric-val">${STATE.metrics.alerts}</span></div><div class="metric-row"><span>Attacks Sim</span><span class="metric-val">${STATE.metrics.attacks}</span></div><div class="metric-row"><span>Blocked</span><span class="metric-val">${STATE.metrics.blocked}</span></div></div><div style="margin-bottom:0.7rem"><div style="color:var(--green-bright);margin-bottom:0.25rem">TOP PERFORMERS</div>${topBots.map(b=>`<div class="metric-row"><span>${b.handle}</span><span class="metric-val">${b.total}%</span></div>`).join('')}</div><div><div style="color:var(--green-bright);margin-bottom:0.25rem">TRENDING KEYWORDS</div>${topKws.map(([k,v])=>`<div class="metric-row"><span>${k}</span><span class="metric-val">${v}</span></div>`).join('')}</div>`},toast(msg,type='info'){const c=document.getElementById('toast-container'),t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3000)}};

const App={streamHandler:null,init(){Matrix.init();Engine.init();UI.updateCounters();UI.renderAll();this.bindKeys();UI.sysMsg(`session initialized: ${STATE.sessionId}`)},toggle(){STATE.running?Engine.stop():Engine.start()},setSpeed(v){STATE.interval=parseInt(v);document.getElementById('speed-val').textContent=(v/1000).toFixed(1)+'s';if(STATE.running){Engine.stop();Engine.start()}},selectTab(tab){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');document.getElementById(`tab-${tab}`).classList.add('active')},selectBot(id){const b=STATE.bots.find(x=>x.id===id);if(b)UI.toast(`selected: ${b.handle} | score: ${b.total}%`)},toggleBookmark(id){const b=STATE.bots.find(x=>x.id===id);if(b){b.bookmarked=!b.bookmarked;UI.renderProfiles();UI.toast(b.bookmarked?`★ ${b.handle} saved`:`${b.handle} unmarked`)}},setPriority(id,p){const b=STATE.bots.find(x=>x.id===id);if(b){b.priority=p;UI.toast(`${b.handle} priority: ${p}`)}},clearChat(){const l=document.getElementById('chat-log'),s=Array.from(l.querySelectorAll('.sys-msg'));l.innerHTML='';s.forEach(x=>l.appendChild(x));UI.sysMsg('chat cleared')},toggleView(){STATE.showMap=!STATE.showMap;const chat=document.getElementById('view-chat'),mapContainer=document.getElementById('view-map');if(STATE.showMap){chat.style.display='none';mapContainer.style.display='flex';requestAnimationFrame(()=>MapEngine.init(mapContainer))}else{chat.style.display='flex';mapContainer.style.display='none'}document.getElementById('panel-title').textContent=STATE.showMap?'map: global-threat-intel':'channel: #threat-intel'},exportJSON(){const d={session:{id:STATE.sessionId,ts:new Date().toISOString()},author:'Zyanetralys',metrics:STATE.metrics,bots:STATE.bots.map(b=>({handle:b.handle,role:b.role,tier:b.getTier(),scores:b.scores,total:b.total,priority:b.priority,expertise:[...b.expertise],hits:b.hits}))};this.download(JSON.stringify(d,null,2),`zya_report_${STATE.sessionId}.json`,'application/json')},exportCSV(){const rows=[['Handle','Role','Tier','Total','Tech','Collab','Threat','Cons','Priority','Keywords']];STATE.bots.sort((a,b)=>b.total-a.total).forEach(b=>{rows.push([b.handle,b.role,b.getTier(),b.total,b.scores.tech,b.scores.collab,b.scores.threat,b.scores.consistency,b.priority,[...b.expertise].join(';')])});this.download(rows.map(r=>r.join(',')).join('\n'),`zya_roster_${STATE.sessionId}.csv`,'text/csv')},download(content,filename,type){const blob=new Blob([content],{type}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href)},toast(msg,type){UI.toast(msg,type)},bindKeys(){document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;const k=e.key.toLowerCase();if(k==='s'){e.preventDefault();this.toggle()}else if(k==='p'){e.preventDefault();this.toggle()}else if(k==='m'){e.preventDefault();this.toggleView()}else if(k==='e'){e.preventDefault();this.exportJSON()}});document.querySelectorAll('.tab-btn').forEach(btn=>{btn.addEventListener('click',()=>this.selectTab(btn.dataset.tab))})}};

window.onload=()=>{App.init()};
</script>
